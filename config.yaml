# Capella Course Podcast Generator configuration.
# Everything runs locally; after the first model download no network calls are made.

llm:
  # Model preset: "12b" (default, best quality, ~6.3 GB, wants ~12 GB free RAM)
  # or "e4b" (lighter/faster for weak hardware, ~4.5B effective params).
  # Also selectable per run: capella-podcast --model e4b <command>
  model: 12b
  # Advanced overrides (uncomment to pin a specific repo/quant/file; these
  # take precedence over the preset):
  #   repo_id: unsloth/gemma-4-12b-it-GGUF   # e.g. non-QAT alternate
  #   quant: Q5_K_M
  #   model_file: my-model.gguf              # exact filename in the cache dir
  # NOTE: the default QAT repo's only main weights file is UD-Q4_K_XL (no
  # Q4_0 exists there). Auxiliary GGUFs (MTP heads, mmproj) are never selected.
  cache_dir: models/        # local GGUF cache (gitignored)
  context_length: 8192      # working context per call (largest module digest ~6K tokens); model supports up to 256K
  thinking_mode: false      # OFF by default for throughput; spec-confirmed toggle
  sampling:                 # Gemma 4 recommended defaults
    temperature: 1.0
    top_p: 0.95
    top_k: 64
  ram_warn_gb: 12           # warn / suggest E4B fallback below this much free RAM

tts:
  engine: kokoro            # Kokoro-82M v1.0 via the `kokoro` package (needs espeak-ng)
  voices:                   # one distinct voice per host, order = HOST A, HOST B
    - af_heart              # US English female
    - am_michael            # US English male
  speed: 1.0
  sample_rate: 24000
  mp3_bitrate: 96k

podcast:
  hosts: 2
  target_minutes_min: 3
  target_minutes_max: 6

report:
  brand_color: "0F4761"     # deep teal for title + section headings
  font: Aptos
  font_fallback: Arial
  logo_path: null           # override; null = auto-locate *capella*logo*.png in assets/
  assets_dir: assets/
  # FPX module label is an open question (spec default: Assessment Summary).
  fpx_title_template: "Assessment Summary: Assessment {n}"
  gp_title_template: "Weekly Summary: Week {n}"

output:
  dir: output/
